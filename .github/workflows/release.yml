name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  JAVA_VERSION: '21'
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Extract Version from Tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Fat Jar
        run: ./gradlew build -x test

      - name: Find Built JAR
        id: find-jar
        run: |
          JAR=$(find build/libs -name "CardBoard-Fork-SharkMI-*.jar" ! -name "*-sources.jar" ! -name "*-dev.jar" | head -n1)
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "jar_name=$(basename $JAR)" >> $GITHUB_OUTPUT

      - name: Compute SHA256
        id: sha256
        run: |
          SHA=$(sha256sum ${{ steps.find-jar.outputs.jar_path }} | awk '{print $1}')
          echo "checksum=$SHA" >> $GITHUB_OUTPUT
          echo "$SHA  ${{ steps.find-jar.outputs.jar_name }}" > build/checksums.txt

      - name: Collect Commit History
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "First release, collecting all commits..."
            COMMIT_RANGE=""
          else
            echo "Collecting commits from ${PREV_TAG} to ${GITHUB_REF_NAME}..."
            COMMIT_RANGE="${PREV_TAG}..HEAD"
          fi

          # Helper: categorize commits by conventional commit prefix
          categorize_commits() {
            local pattern="$1"
            git log --pretty=format:"%s (%h)" --no-merges ${COMMIT_RANGE} | grep -iE "^$pattern" | sed -E "s/^$pattern//" | sed 's/^/- /'
          }

          FEATURES=$(categorize_commits 'feat(\([^)]*\))?:[[:space:]]*')
          BUGFIXES=$(categorize_commits 'fix(\([^)]*\))?:[[:space:]]*')
          PERF=$(categorize_commits 'perf(\([^)]*\))?:[[:space:]]*')
          REFACTORS=$(categorize_commits 'refactor(\([^)]*\))?:[[:space:]]*')
          BUILDS=$(categorize_commits 'build(\([^)]*\))?:[[:space:]]*')
          CICD=$(categorize_commits 'ci(\([^)]*\))?:[[:space:]]*')
          DOCS=$(categorize_commits 'docs(\([^)]*\))?:[[:space:]]*')
          CONFIGS=$(categorize_commits 'config(\([^)]*\))?:[[:space:]]*')
          TESTS=$(categorize_commits 'test(\([^)]*\))?:[[:space:]]*')
          STYLES=$(categorize_commits 'style(\([^)]*\))?:[[:space:]]*')
          CHORES=$(categorize_commits 'chore(\([^)]*\))?:[[:space:]]*')
          DEBUGS=$(categorize_commits 'debug(\([^)]*\))?:[[:space:]]*')

          # Other = commits that don't match conventional commit
          ALL_PATTERN='^(feat|fix|perf|refactor|build|ci|docs|config|test|style|chore|debug)(\([^)]*\))?:[[:space:]]*'
          OTHERS=$(git log --pretty=format:"%s (%h)" --no-merges ${COMMIT_RANGE} | grep -viE "$ALL_PATTERN" | sed 's/^/- /')

          # Contributors
          CONTRIBUTORS=$(git log --pretty=format:"%an" --no-merges ${COMMIT_RANGE} | sort | uniq -c | sort -rn | sed -E 's/^[[:space:]]*([0-9]+)[[:space:]]+(.*)$/\2 (`\1`)/')
          TOTAL_COMMITS=$(git log --oneline --no-merges ${COMMIT_RANGE} | wc -l)

          # Build markdown body
          {
            echo "changelog<<EOF"
            echo ""
            echo "## What's Changed"
            echo ""

            if [ -n "$FEATURES" ]; then
              echo "### :sparkles: Features"
              echo "$FEATURES"
              echo ""
            fi

            if [ -n "$BUGFIXES" ]; then
              echo "### :bug: Bug Fixes"
              echo "$BUGFIXES"
              echo ""
            fi

            if [ -n "$PERF" ]; then
              echo "### :zap: Performance"
              echo "$PERF"
              echo ""
            fi

            if [ -n "$REFACTORS" ]; then
              echo "### :recycle: Refactors"
              echo "$REFACTORS"
              echo ""
            fi

            if [ -n "$CONFIGS" ]; then
              echo "### :gear: Configuration"
              echo "$CONFIGS"
              echo ""
            fi

            if [ -n "$BUILDS" ]; then
              echo "### :package: Build"
              echo "$BUILDS"
              echo ""
            fi

            if [ -n "$CICD" ]; then
              echo "### :rocket: CI/CD"
              echo "$CICD"
              echo ""
            fi

            if [ -n "$DOCS" ]; then
              echo "### :memo: Documentation"
              echo "$DOCS"
              echo ""
            fi

            if [ -n "$TESTS" ]; then
              echo "### :test_tube: Tests"
              echo "$TESTS"
              echo ""
            fi

            if [ -n "$STYLES" ]; then
              echo "### :art: Style"
              echo "$STYLES"
              echo ""
            fi

            if [ -n "$CHORES" ]; then
              echo "### :broom: Chores"
              echo "$CHORES"
              echo ""
            fi

            if [ -n "$DEBUGS" ]; then
              echo "### :bug: Debug"
              echo "$DEBUGS"
              echo ""
            fi

            if [ -n "$OTHERS" ]; then
              echo "### :question: Other"
              echo "$OTHERS"
              echo ""
            fi

            echo "---"
            echo ""
            echo "### :busts_in_silhouette: Contributors"
            echo ""
            echo "$CONTRIBUTORS" | sed 's/^/- /'
            echo ""
            echo "**Total commits:** ${TOTAL_COMMITS}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CardBoard Fork SharkMI ${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            ${{ steps.find-jar.outputs.jar_path }}
            build/checksums.txt
          draft: false
          prerelease: false

      - name: Publish to Modrinth
        if: env.MODRINTH_TOKEN != ''
        run: ./gradlew modrinth

      - name: Publish Success Summary
        if: success()
        run: |
          echo "Release successful!"
          echo "Version: ${{ steps.get_version.outputs.version }}"
          echo "GitHub Release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
