name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build fat jar
        run: ./gradlew build -x test

      - name: Find built jar
        id: find-jar
        run: |
          JAR=$(find build/libs -name "Cardboard-*.jar" ! -name "*-sources.jar" ! -name "*-dev.jar" | head -n1)
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "jar_name=$(basename $JAR)" >> $GITHUB_OUTPUT

      - name: Compute SHA256
        id: sha256
        run: |
          SHA=$(sha256sum ${{ steps.find-jar.outputs.jar_path }} | awk '{print $1}')
          echo "checksum=$SHA" >> $GITHUB_OUTPUT
          echo "$SHA  ${{ steps.find-jar.outputs.jar_name }}" > build/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.find-jar.outputs.jar_path }}
            build/checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
