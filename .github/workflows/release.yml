name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to create release for (e.g. v2026.5.1)'
        required: true
        default: 'v2026.5.1'

permissions:
  contents: write

env:
  JAVA_VERSION: '21'
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Extract Version from Tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
            echo "ref_name=${TAG_NAME}" >> $GITHUB_OUTPUT
            echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            echo "ref_name=${TAG_NAME}" >> $GITHUB_OUTPUT
            echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          fi
          VERSION="${TAG_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Fat Jar
        run: ./gradlew build -x test

      - name: Find Built JAR
        id: find-jar
        run: |
          # List all jars for debugging
          echo "=== All jars in build/libs ==="
          ls -la build/libs/*.jar 2>/dev/null || echo "(none)"
          echo ""
          # Find the release jar (exclude sources, dev, slim variants)
          JAR=$(find build/libs -name "CardBoard-Fork-SharkMI-*.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-dev.jar" \
            ! -name "*-slim.jar" \
            ! -name "*-all.jar" | head -n1)
          if [ -z "$JAR" ]; then
            echo "ERROR: No release JAR found!"
            exit 1
          fi
          echo "Selected JAR: $JAR"
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "jar_name=$(basename $JAR)" >> $GITHUB_OUTPUT

      - name: Compute SHA256
        id: sha256
        run: |
          SHA=$(sha256sum ${{ steps.find-jar.outputs.jar_path }} | awk '{print $1}')
          echo "checksum=$SHA" >> $GITHUB_OUTPUT
          echo "$SHA  ${{ steps.find-jar.outputs.jar_name }}" > build/checksums.txt

      - name: Collect Commit History
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "First release, collecting all commits..."
            COMMIT_RANGE=""
          else
            echo "Collecting commits from ${PREV_TAG} to ${TAG_NAME}..."
            COMMIT_RANGE="${PREV_TAG}..HEAD"
          fi

          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"

          # Helper: categorize commits by conventional commit prefix
          # Converts "commit message (abc1234)" -> "- commit message ([`abc1234`](url/commit/abc1234))"
          categorize_commits() {
            local pattern="$1"
            git log --pretty=format:"%s (%h)" --no-merges ${COMMIT_RANGE} | \
              grep -iE "^$pattern" | \
              sed -E "s|^$pattern||" | \
              sed -E 's|\(([a-f0-9]{7,40})\)$|([`\1`]('"$REPO_URL"'/commit/\1))|' | \
              sed 's|^|- |'
          }

          FEATURES=$(categorize_commits 'feat(\([^)]*\))?:[[:space:]]*')
          BUGFIXES=$(categorize_commits 'fix(\([^)]*\))?:[[:space:]]*')
          PERF=$(categorize_commits 'perf(\([^)]*\))?:[[:space:]]*')
          REFACTORS=$(categorize_commits 'refactor(\([^)]*\))?:[[:space:]]*')
          BUILDS=$(categorize_commits 'build(\([^)]*\))?:[[:space:]]*')
          CICD=$(categorize_commits 'ci(\([^)]*\))?:[[:space:]]*')
          DOCS=$(categorize_commits 'docs(\([^)]*\))?:[[:space:]]*')
          CONFIGS=$(categorize_commits 'config(\([^)]*\))?:[[:space:]]*')
          TESTS=$(categorize_commits 'test(\([^)]*\))?:[[:space:]]*')
          STYLES=$(categorize_commits 'style(\([^)]*\))?:[[:space:]]*')
          CHORES=$(categorize_commits 'chore(\([^)]*\))?:[[:space:]]*')
          DEBUGS=$(categorize_commits 'debug(\([^)]*\))?:[[:space:]]*')

          # Other = commits that don't match conventional commit
          ALL_PATTERN='^(feat|fix|perf|refactor|build|ci|docs|config|test|style|chore|debug)(\([^)]*\))?:[[:space:]]*'
          OTHERS=$(git log --pretty=format:"%s (%h)" --no-merges ${COMMIT_RANGE} | \
            grep -viE "$ALL_PATTERN" | \
            sed -E 's|\(([a-f0-9]{7,40})\)$|([`\1`]('"$REPO_URL"'/commit/\1))|' | \
            sed 's|^|- |')

          # Contributors
          CONTRIBUTORS=$(git log --pretty=format:"%an" --no-merges ${COMMIT_RANGE} | sort | uniq -c | sort -rn | sed -E 's|^[[:space:]]*([0-9]+)[[:space:]]+(.*)$|\2 (`\1`)|')
          TOTAL_COMMITS=$(git log --oneline --no-merges ${COMMIT_RANGE} | wc -l)

          # Build markdown body
          {
            echo "changelog<<EOF"
            echo ""
            echo "## What's Changed"
            echo ""

            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES"
              echo ""
            fi

            if [ -n "$BUGFIXES" ]; then
              echo "### Bug Fixes"
              echo "$BUGFIXES"
              echo ""
            fi

            if [ -n "$PERF" ]; then
              echo "### Performance"
              echo "$PERF"
              echo ""
            fi

            if [ -n "$REFACTORS" ]; then
              echo "### Refactors"
              echo "$REFACTORS"
              echo ""
            fi

            if [ -n "$CONFIGS" ]; then
              echo "### Configuration"
              echo "$CONFIGS"
              echo ""
            fi

            if [ -n "$BUILDS" ]; then
              echo "### Build"
              echo "$BUILDS"
              echo ""
            fi

            if [ -n "$CICD" ]; then
              echo "### CI/CD"
              echo "$CICD"
              echo ""
            fi

            if [ -n "$DOCS" ]; then
              echo "### Documentation"
              echo "$DOCS"
              echo ""
            fi

            if [ -n "$TESTS" ]; then
              echo "### Tests"
              echo "$TESTS"
              echo ""
            fi

            if [ -n "$STYLES" ]; then
              echo "### Style"
              echo "$STYLES"
              echo ""
            fi

            if [ -n "$CHORES" ]; then
              echo "### Chores"
              echo "$CHORES"
              echo ""
            fi

            if [ -n "$DEBUGS" ]; then
              echo "### Debug"
              echo "$DEBUGS"
              echo ""
            fi

            if [ -n "$OTHERS" ]; then
              echo "### Other"
              echo "$OTHERS"
              echo ""
            fi

            echo "---"
            echo ""
            echo "### Contributors"
            echo ""
            echo "$CONTRIBUTORS" | sed 's/^/- /'
            echo ""
            echo "**Total commits:** ${TOTAL_COMMITS}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Delete Existing Release (for re-tagging)
        run: |
          TAG_REF="${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}"
          RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG_REF}" | \
            jq -r '.id')
          if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
            echo "Deleting existing release ID=$RELEASE_ID for tag=${TAG_REF}..."
            curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
            echo "Deleted. Will recreate with fresh changelog."
          else
            echo "No existing release found for tag=${TAG_REF}, proceeding with creation."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          name: CardBoard Fork SharkMI ${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            ${{ steps.find-jar.outputs.jar_path }}
            build/checksums.txt
          draft: false
          prerelease: false

      - name: Publish to Modrinth
        if: env.MODRINTH_TOKEN != ''
        run: ./gradlew modrinth

      - name: Publish Success Summary
        if: success()
        run: |
          TAG_REF="${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}"
          echo "Release successful!"
          echo "Version: ${{ steps.get_version.outputs.version }}"
          echo "GitHub Release: https://github.com/${{ github.repository }}/releases/tag/${TAG_REF}"
